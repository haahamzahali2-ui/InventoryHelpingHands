<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clinic Medication Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#ffffff,#f8f6f0);
}
header {
  text-align:center;
  padding:30px;
  font-size:2em;
  font-weight:700;
  color:#b68b2c;
  border-bottom:2px solid rgba(212,175,55,0.3);
}
button {
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#b68b2c;
  color:white;
  cursor:pointer;
}
button:hover { background:#a67c1f; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  max-width:1100px;
  margin:30px auto;
  padding:0 20px;
}
.card {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
}
.quantity { font-size:2em; font-weight:700; margin:10px 0; }
.low { color:red; }
.search { text-align:center; margin-top:20px; }
.search input {
  padding:8px;
  width:280px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>
<body>

<header>Clinic Medication Inventory</header>

<div class="search">
  <input type="text" id="searchInput" placeholder="Search medicine..." onkeyup="renderMeds()">
</div>

<div class="grid" id="medGrid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDuqQypNgUjNyiRaaVXeSaosd48-eCVAl0",
  authDomain: "pharm-inventory-6f2e0.firebaseapp.com",
  projectId: "pharm-inventory-6f2e0",
  storageBucket: "pharm-inventory-6f2e0.firebasestorage.app",
  messagingSenderId: "207537149717",
  appId: "1:207537149717:web:10266cbedd8495868cfb1c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let medications = [];

// Load medications from Firestore
async function loadData(){
  const snapshot = await getDocs(collection(db,"medications"));
  medications = snapshot.docs.map(doc=>({id:doc.id,...doc.data()}));

  if(medications.length === 0){
    const defaults = [
      { name:"Metformin 500mg", qty:25 },
      { name:"Advil (Ibuprofen 200mg)", qty:40 },
      { name:"Tylenol (Acetaminophen 500mg)", qty:8 },
      { name:"Lisinopril 10mg", qty:15 },
      { name:"Amoxicillin 500mg", qty:6 }
    ];
    for(let med of defaults){
      await setDoc(doc(db,"medications",med.name),med);
    }
  }

  // Real-time updates
  onSnapshot(collection(db,"medications"), snap=>{
    medications = snap.docs.map(doc=>({id:doc.id,...doc.data()}));
    renderMeds();
  });
}

// Render inventory cards
function renderMeds(){
  const grid = document.getElementById("medGrid");
  const search = document.getElementById("searchInput").value.toLowerCase();
  grid.innerHTML="";

  medications.filter(m=>m.name.toLowerCase().includes(search))
    .forEach(med=>{
      const card=document.createElement("div");
      card.className="card";
      const low = med.qty<10?"low":"";
      card.innerHTML=`
        <h3>${med.name}</h3>
        <div class="quantity ${low}">${med.qty}</div>
        <button onclick="updateQty('${med.id}',1)">+</button>
        <button onclick="updateQty('${med.id}',-1)">−</button>
        <br><br>
        <input type="number" id="custom-${med.id}" placeholder="+/-">
        <button onclick="customAdjust('${med.id}')">Apply</button>
      `;
      grid.appendChild(card);
    });
}

// Quick + / −
window.updateQty = async function(id, amount){
  const med = medications.find(m=>m.id===id);
  await setDoc(doc(db,"medications",id),{
    name:med.name,
    qty:Math.max(0,med.qty+amount)
  });
};

// Custom number adjustment
window.customAdjust = async function(id){
  const value = parseInt(document.getElementById(`custom-${id}`).value);
  if(isNaN(value)) return;
  const med = medications.find(m=>m.id===id);
  await setDoc(doc(db,"medications",id),{
    name:med.name,
    qty:Math.max(0,med.qty+value)
  });
};

// Load data initially
loadData();
</script>

</body>
</html>
