<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clinic Medication Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #ffffff, #f8f6f0);
    color: #1a1a1a;
}

header {
    text-align: center;
    padding: 40px 20px;
    font-size: 2.5em;
    font-weight: 700;
    color: #b68b2c;
    border-bottom: 2px solid rgba(212,175,55,0.3);
    background: linear-gradient(to right, #ffffff, #f3efe3);
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    max-width: 1200px;
    margin: 50px auto;
    padding: 0 30px 60px 30px;
}

.card {
    background: #ffffff;
    border-radius: 14px;
    padding: 25px;
    border: 1px solid rgba(212,175,55,0.35);
    box-shadow: 0 8px 25px rgba(212,175,55,0.08);
    text-align: center;
}

.card-title {
    font-size: 1.2em;
    font-weight: 600;
    color: #b68b2c;
    margin-bottom: 15px;
}

.quantity {
    font-size: 2em;
    font-weight: 700;
    margin: 10px 0;
}

.low-stock {
    color: red;
    font-weight: 600;
}

.controls button {
    font-size: 1.5em;
    width: 50px;
    height: 50px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background-color: #b68b2c;
    color: white;
}

.controls button:hover {
    background-color: #a67c1f;
}

@media (max-width: 600px) {
    header { font-size: 1.8em; }
}
</style>
</head>
<body>

<header>
Clinic Medication Inventory Tracker
</header>

<div class="grid" id="medGrid"></div>

<script>
let medications = [
    { name: "Metformin 500mg", qty: 25 },
    { name: "Advil (Ibuprofen 200mg)", qty: 40 },
    { name: "Tylenol (Acetaminophen 500mg)", qty: 8 },
    { name: "Lisinopril 10mg", qty: 15 },
    { name: "Amoxicillin 500mg", qty: 6 }
];

function renderMeds() {
    const grid = document.getElementById("medGrid");
    grid.innerHTML = "";

    medications.forEach((med, index) => {
        const card = document.createElement("div");
        card.className = "card";

        const isLow = med.qty < 10 ? "low-stock" : "";

        card.innerHTML = `
            <div class="card-title">${med.name}</div>
            <div class="quantity ${isLow}">${med.qty}</div>
            <div class="controls">
                <button onclick="decrease(${index})">−</button>
                <button onclick="increase(${index})">+</button>
            </div>
        `;

        grid.appendChild(card);
    });
}

function increase(index) {
    medications[index].qty++;
    renderMeds();
}

function decrease(index) {
    if (medications[index].qty > 0) {
        medications[index].qty--;
    }
    renderMeds();
}

renderMeds();
</script>

</body>
</html>
