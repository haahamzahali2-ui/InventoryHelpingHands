<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pharmacy Inventory</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    input[type="number"] { width: 60px; }
    button { padding: 5px 10px; margin-left: 5px; }
    .add-medicine { margin-top: 20px; }
    .add-medicine input { margin-right: 10px; }
  </style>
</head>
<body>

<h1>Pharmacy Inventory</h1>

<!-- Medicine Table -->
<table id="medicineTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Quantity</th>
      <th>Expiry Date</th>
      <th>Batch</th>
      <th>Adjust Quantity</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- Add New Medicine -->
<div class="add-medicine">
  <input type="text" id="newName" placeholder="Medicine Name">
  <input type="number" id="newQuantity" placeholder="Quantity">
  <input type="text" id="newExpiry" placeholder="Expiry YYYY-MM-DD">
  <input type="text" id="newBatch" placeholder="Batch Number">
  <button onclick="addMedicine()">Add Medicine</button>
</div>

<!-- Firebase SDK -->
<script type="module">
  // Firebase setup
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBa7d4vvoeZuYqTHRpaYUV45Fsq2aHdm0c",
    authDomain: "helping-hands-inventory.firebaseapp.com",
    projectId: "helping-hands-inventory",
    storageBucket: "helping-hands-inventory.firebasestorage.app",
    messagingSenderId: "317180675923",
    appId: "1:317180675923:web:2ab3f9f76e2525162a43a6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const medicinesCol = collection(db, "medicines");

  // Fetch and display medicines
  async function loadMedicines() {
    const tbody = document.querySelector("#medicineTable tbody");
    tbody.innerHTML = ""; // Clear table
    const snapshot = await getDocs(medicinesCol);
    snapshot.forEach(docSnap => {
      const med = docSnap.data();
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${med.name}</td>
        <td id="qty-${docSnap.id}">${med.quantity}</td>
        <td>${med.expiry_date}</td>
        <td>${med.batch_number}</td>
        <td>
          <input type="number" id="adjust-${docSnap.id}" value="1">
          <button onclick="adjustQuantity('${docSnap.id}', true)">+Add</button>
          <button onclick="adjustQuantity('${docSnap.id}', false)">-Subtract</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  // Add new medicine
  async function addMedicine() {
    const name = document.getElementById("newName").value.trim();
    const quantity = parseInt(document.getElementById("newQuantity").value);
    const expiry = document.getElementById("newExpiry").value.trim();
    const batch = document.getElementById("newBatch").value.trim();
    if (!name || isNaN(quantity) || !expiry || !batch) { alert("Fill all fields!"); return; }

    await addDoc(medicinesCol, {
      name,
      quantity,
      expiry_date: expiry,
      batch_number: batch
    });

    // Clear input fields
    document.getElementById("newName").value = "";
    document.getElementById("newQuantity").value = "";
    document.getElementById("newExpiry").value = "";
    document.getElementById("newBatch").value = "";

    loadMedicines();
  }

  // Adjust quantity
  async function adjustQuantity(id, isAdd) {
    const input = document.getElementById(`adjust-${id}`);
    const amount = parseInt(input.value);
    if (isNaN(amount)) return;

    const docRef = doc(db, "medicines", id);
    const docSnap = await docRef.get();
    // Firestore v12 modular does not have get() on docRef directly; we'll just update blindly
    const currentQty = parseInt(document.getElementById(`qty-${id}`).innerText) || 0;
    const newQty = isAdd ? currentQty + amount : currentQty - amount;

    await updateDoc(docRef, { quantity: newQty < 0 ? 0 : newQty });

    loadMedicines();
  }

  // Initial load
  loadMedicines();
</script>

</body>
</html>
