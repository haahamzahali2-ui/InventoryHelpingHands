<!DOCTYPE html>
<html>
<head>
  <title>Pharmacy Inventory</title>
</head>
<body>
  <h1>Pharmacy Inventory</h1>

  <table border="1" id="medTable">
    <tr>
      <th>Name</th><th>Quantity</th><th>Expiry</th><th>Batch</th><th>Adjust</th>
    </tr>
  </table>

  <h3>Add New Medicine</h3>
  Name: <input id="newName"><br>
  Quantity: <input id="newQty" type="number"><br>
  Expiry: <input id="newExpiry"><br>
  Batch: <input id="newBatch"><br>
  <button onclick="addMedicine()">Add</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBa7d4vvoeZuYqTHRpaYUV45Fsq2aHdm0c",
      authDomain: "helping-hands-inventory.firebaseapp.com",
      projectId: "helping-hands-inventory",
      storageBucket: "helping-hands-inventory.firebasestorage.app",
      messagingSenderId: "317180675923",
      appId: "1:317180675923:web:2ab3f9f76e2525162a43a6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const medicinesCol = collection(db, "medicines");

    async function loadMedicines() {
      const table = document.getElementById("medTable");
      // remove old rows
      table.innerHTML = "<tr><th>Name</th><th>Quantity</th><th>Expiry</th><th>Batch</th><th>Adjust</th></tr>";

      const snapshot = await getDocs(medicinesCol);
      snapshot.forEach(docSnap => {
        const med = docSnap.data();
        const id = docSnap.id;
        const row = table.insertRow();
        row.insertCell().innerText = med.name;
        row.insertCell().innerText = med.quantity;
        row.insertCell().innerText = med.expiry_date;
        row.insertCell().innerText = med.batch_number;
        row.insertCell().innerHTML = `
          <input type="number" id="adjust-${id}" value="1">
          <button onclick="adjustQuantity('${id}', true)">+Add</button>
          <button onclick="adjustQuantity('${id}', false)">-Sub</button>
        `;
      });
    }

    async function addMedicine() {
      const name = document.getElementById("newName").value;
      const qty = parseInt(document.getElementById("newQty").value);
      const expiry = document.getElementById("newExpiry").value;
      const batch = document.getElementById("newBatch").value;
      if(!name || isNaN(qty) || !expiry || !batch) return alert("Fill all fields!");

      await addDoc(medicinesCol, {name, quantity: qty, expiry_date: expiry, batch_number: batch});
      loadMedicines();
    }

    async function adjustQuantity(id, isAdd) {
      const val = parseInt(document.getElementById(`adjust-${id}`).value);
      if(isNaN(val)) return;
      const docRef = doc(db, "medicines", id);
      const docSnap = await getDoc(docRef);
      const current = docSnap.data().quantity || 0;
      const newQty = isAdd ? current + val : current - val;
      await updateDoc(docRef, {quantity: newQty < 0 ? 0 : newQty});
      loadMedicines();
    }

    loadMedicines();
  </script>
</body>
</html>
