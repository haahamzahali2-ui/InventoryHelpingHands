<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1a2e;
      --accent: #c8a96e;
      --muted: #7a7a8a;
      --error: #c0392b;
      --card: #ffffff;
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Decorative background shapes */
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, #e8dcc8 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 380px; height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, #d4c4a8 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 52px 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 48px rgba(26,26,46,0.10), 0 1px 4px rgba(26,26,46,0.06);
      position: relative;
      z-index: 1;
      animation: rise 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 52px; height: 52px;
      background: var(--ink);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .brand-icon svg {
      width: 26px; height: 26px;
      fill: var(--accent);
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      color: var(--ink);
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 5px;
      font-weight: 300;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #e0dbd0;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.975rem;
      color: var(--ink);
      background: #fafaf8;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.15);
      background: #fff;
    }

    .error-msg {
      font-size: 0.82rem;
      color: var(--error);
      margin-top: 16px;
      text-align: center;
      min-height: 20px;
      font-weight: 400;
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      60%      { transform: translateX(6px); }
    }

    .btn {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.975rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: #2d2d4e;
      box-shadow: 0 4px 18px rgba(26,26,46,0.22);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    /* Ripple */
    .btn::after {
      content: '';
      position: absolute;
      left: 50%; top: 50%;
      width: 0; height: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: width 0.4s, height 0.4s, opacity 0.4s;
      opacity: 0;
    }
    .btn:active::after {
      width: 300px; height: 300px; opacity: 1;
    }

    .success-screen {
      display: none;
      text-align: center;
      padding: 16px 0;
      animation: rise 0.45s ease both;
    }

    .success-screen .check {
      width: 64px; height: 64px;
      background: #e8f5e9;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .success-screen .check svg {
      width: 30px; height: 30px;
      stroke: #2e7d32;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .success-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .success-screen p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .divider {
      height: 1px;
      background: #ede8de;
      margin: 28px 0 0;
    }

    .footer-note {
      text-align: center;
      margin-top: 18px;
      font-size: 0.78rem;
      color: #b0a898;
    }
  </style>
</head>
<body>

<div class="card">
  <!-- Login Form -->
  <div id="loginForm">
    <div class="brand">
      <div class="brand-icon">
        <!-- Simple hands/people icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm-7 18c0-3.87 3.13-7 7-7s7 3.13 7 7H5z"/>
        </svg>
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to your account to continue</p>
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="btn" onclick="handleLogin()">Sign In</button>

    <div class="divider"></div>
    <p class="footer-note">HelpingHands Portal &mdash; Authorized users only</p>
  </div>

  <!-- Success Screen -->
  <div class="success-screen" id="successScreen">
    <div class="check">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2>You're in!</h2>
    <p>Login successful. Welcome, HelpingHands.</p>
  </div>
</div>

<script>
  // ── Credentials ──────────────────────────────────────
  const VALID_USERNAME = "HelpingHands";
  const VALID_PASSWORD = "1421";
  // ─────────────────────────────────────────────────────

  function handleLogin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    if (!username || !password) {
      showError("Please fill in both fields.");
      return;
    }

    if (username === VALID_USERNAME && password === VALID_PASSWORD) {
      document.getElementById("loginForm").style.display = "none";
      const success = document.getElementById("successScreen");
      success.style.display = "block";
      setTimeout(() => {
        window.location.href = "https://haahamzahali2-ui.github.io/InventoryHelpingHands";
      }, 1500);
    } else {
      showError("Incorrect username or password.");
    }
  }

  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = "";
    // Force reflow to restart animation
    void el.offsetWidth;
    el.textContent = msg;
  }

  // Allow pressing Enter to submit
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") handleLogin();
  });
</script>

</body>
</html>
