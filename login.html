<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helping Hands — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E5C97E;
      --cream: #F7F3EA;
      --off-white: #FDFAF4;
      --bg: #1A1208;
      --bg2: #221A0C;
      --text-dark: #2C2010;
      --border: rgba(201,168,76,0.18);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Subtle radial glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(201,168,76,0.07); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: rgba(201,168,76,0.05); bottom: -80px; right: -80px; animation-delay: -4s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(255,253,244,0.03);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 52px 52px 44px;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(201,168,76,0.08),
        0 40px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(201,168,76,0.04) inset;
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .logo-badge {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--gold), #A8782A);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--bg);
      letter-spacing: 0.02em;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(201,168,76,0.3);
    }

    .logo-text-wrap .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--gold-light);
      line-height: 1.2;
    }
    .logo-text-wrap .logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: rgba(201,168,76,0.45);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .login-heading {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: #F5EDD6;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .login-heading em {
      font-style: italic;
      color: var(--gold-light);
    }

    .login-sub {
      font-size: 14px;
      color: rgba(245,237,214,0.4);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 32px;
    }

    /* Microsoft sign-in button */
    .ms-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 24px;
      border-radius: 14px;
      border: 1px solid rgba(201,168,76,0.25);
      background: rgba(201,168,76,0.06);
      color: #F5EDD6;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.01em;
    }
    .ms-btn:hover {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .ms-btn:active { transform: translateY(0); }
    .ms-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .ms-logo {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Spinner inside button */
    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(245,237,214,0.2);
      border-top-color: var(--gold-light);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-error {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(232,112,112,0.1);
      border: 1px solid rgba(232,112,112,0.25);
      color: #f5a0a0;
      font-size: 13px;
      line-height: 1.5;
      display: none;
    }

    .login-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: rgba(201,168,76,0.25);
      letter-spacing: 0.04em;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-card">
    <div class="logo-wrap">
      <div class="logo-badge">HH</div>
      <div class="logo-text-wrap">
        <div class="logo-name">Helping Hands</div>
        <div class="logo-sub">Free Clinic</div>
      </div>
    </div>

    <h1 class="login-heading">Welcome <em>back.</em></h1>
    <p class="login-sub">Sign in to access the Patient Care Portal. Your session is secured by Microsoft.</p>

    <div class="divider"></div>

    <button class="ms-btn" id="signInBtn" onclick="signIn()">
      <svg class="ms-logo" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      <span id="signInBtnText">Sign in with Microsoft</span>
      <div class="btn-spinner" id="signInSpinner"></div>
    </button>

    <div class="login-error" id="loginError"></div>

    <div class="login-footer">
      Helping Hands Health &amp; Wellness Center<br>
      Authorized staff only · All access is logged
    </div>
  </div>

  <!-- MSAL.js v2 from CDN -->
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
